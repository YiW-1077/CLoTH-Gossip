[General]
network = PaymentNetwork
cmdenv-express-mode = true
cmdenv-autoflush = true

# Simulation time (seconds)
sim-time-limit = 120s

[Config NoAttack]
description = "Baseline: No network attack"
*.numNodes = 10
*.linkDelay = 10ms
*.attackDuration = 0s

[Config LightAttack]
description = "Light DDoS attack (50% intensity)"
*.numNodes = 10
*.linkDelay = 10ms
*.attackStartTime = 30s
*.attackDuration = 30s
*.attackIntensity = 1.5

[Config MediumAttack]
description = "Medium DDoS attack (75% intensity)"
*.numNodes = 10
*.linkDelay = 10ms
*.attackStartTime = 30s
*.attackDuration = 30s
*.attackIntensity = 2.0

[Config HeavyAttack]
description = "Heavy DDoS attack (150% intensity)"
*.numNodes = 10
*.linkDelay = 10ms
*.attackStartTime = 30s
*.attackDuration = 30s
*.attackIntensity = 3.0

[Config SustainedAttack]
description = "Sustained attack over entire simulation"
*.numNodes = 10
*.linkDelay = 10ms
*.attackStartTime = 1s
*.attackDuration = 119s
*.attackIntensity = 1.8

[Config MultipleAttacks]
description = "Multiple attacks with recovery periods"
*.numNodes = 20
*.linkDelay = 10ms
*.attackStartTime = 20s
*.attackDuration = 15s
*.attackIntensity = 2.5
